<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}YgLicenseServer{% endblock %}</title>
  <style>
    :root { --bg:#0d1117; --fg:#c9d1d9; --muted:#8b949e; --accent:#58a6ff; --danger:#f85149; --ok:#3fb950; --bd:#30363d; --card:#161b22; }
    * { box-sizing: border-box; }
    body { background:var(--bg); color:var(--fg); font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; margin:0; }
    a { color:var(--accent); text-decoration:none; }
    a:hover { text-decoration:underline; }
    nav { background:var(--card); border-bottom:1px solid var(--bd); padding:.7em 1.5em; display:flex; gap:1.5em; align-items:center; }
    nav a { color:var(--fg); }
    nav .right { margin-left:auto; }
    main { max-width:1200px; margin:0 auto; padding:1.5em; }
    h1, h2, h3 { line-height:1.2; }
    table { width:100%; border-collapse:collapse; margin:1em 0; }
    th, td { padding:.5em .7em; border-bottom:1px solid var(--bd); text-align:left; vertical-align:top; }
    th { color:var(--muted); font-weight:600; font-size:.85em; text-transform:uppercase; letter-spacing:.05em; }
    code, pre { font-family:Menlo,Consolas,monospace; }
    code { background:var(--card); padding:.1em .35em; border-radius:3px; font-size:.9em; }
    pre { background:var(--card); border:1px solid var(--bd); padding:1em; border-radius:6px; overflow:auto; }
    .card { background:var(--card); border:1px solid var(--bd); border-radius:8px; padding:1.2em; margin:1em 0; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:1em; }
    .stat { text-align:center; }
    .stat .n { font-size:2em; font-weight:600; color:var(--accent); }
    .stat .l { color:var(--muted); font-size:.9em; }
    form label { display:block; margin:.8em 0 .25em; color:var(--muted); font-size:.9em; }
    form input, form textarea, form select { width:100%; padding:.5em .7em; border:1px solid var(--bd); background:var(--bg); color:var(--fg); border-radius:4px; font:inherit; }
    button, .btn { background:var(--accent); color:#fff; border:0; padding:.5em 1.1em; border-radius:4px; cursor:pointer; font:inherit; display:inline-block; }
    button:hover, .btn:hover { filter:brightness(1.1); text-decoration:none; }
    .btn.danger { background:var(--danger); }
    .btn.muted { background:#21262d; color:var(--fg); border:1px solid var(--bd); }
    .badge { display:inline-block; padding:.1em .55em; border-radius:10px; font-size:.8em; }
    .badge.active { background:rgba(63,185,80,.15); color:var(--ok); }
    .badge.delinquent { background:rgba(248,81,73,.15); color:var(--danger); }
    .badge.revoked { background:#21262d; color:var(--muted); }
    .badge.disabled { background:rgba(210,153,34,.15); color:#d29922; }
    .error { background:rgba(248,81,73,.1); border:1px solid var(--danger); padding:.7em 1em; border-radius:4px; color:var(--danger); margin:1em 0; }
    .success { background:rgba(63,185,80,.1); border:1px solid var(--ok); padding:.7em 1em; border-radius:4px; color:var(--ok); margin:1em 0; }
    .muted { color:var(--muted); }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.65); display:flex; align-items:center; justify-content:center; z-index:1000; }
    .modal-card { background:var(--card); border:1px solid var(--bd); border-radius:8px; padding:1.5em; max-width:520px; width:calc(100% - 2em); box-shadow:0 12px 40px rgba(0,0,0,.6); }
    .modal-card h3 { margin:0 0 .5em; }
    .modal-card p { margin:.5em 0; color:var(--fg); }
    .modal-card .step { color:var(--muted); font-size:.8em; text-transform:uppercase; letter-spacing:.05em; margin-bottom:.3em; }
    .modal-actions { display:flex; gap:.6em; justify-content:flex-end; margin-top:1.2em; }
  </style>
</head>
<body>
  {% if request.cookies.get('asm_ls_session') %}
  <nav>
    <strong><a href="/admin">YgLicenseServer</a></strong>
    <a href="/admin">Dashboard</a>
    <a href="/admin/customers">Customers</a>
    <a href="/admin/events">Events</a>
    <form class="right" action="/admin/logout" method="post" style="margin:0;">
      <button class="btn muted" type="submit">Log Out</button>
    </form>
  </nav>
  {% endif %}
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Reusable confirm modal. Hidden until window.confirmModal(...) shows it. -->
  <div id="confirm-modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
    <div class="modal-card">
      <div class="step" id="confirm-step"></div>
      <h3 id="confirm-title"></h3>
      <p id="confirm-body"></p>
      <div class="modal-actions">
        <button type="button" class="btn muted" id="confirm-cancel">Cancel</button>
        <button type="button" class="btn danger" id="confirm-ok">Continue</button>
      </div>
    </div>
  </div>

  <script>
    // Promise-based modal confirm. Replaces window.confirm for our destructive
    // flows. Esc / clicking the backdrop = cancel; Enter = confirm.
    window.confirmModal = function (opts) {
      return new Promise(function (resolve) {
        var ov = document.getElementById('confirm-modal');
        document.getElementById('confirm-step').textContent = opts.step || '';
        document.getElementById('confirm-title').textContent = opts.title || 'Confirm';
        document.getElementById('confirm-body').textContent = opts.body || '';
        var ok = document.getElementById('confirm-ok');
        var cancel = document.getElementById('confirm-cancel');
        ok.textContent = opts.confirmLabel || 'Continue';
        ov.style.display = '';
        function done(result) {
          ov.style.display = 'none';
          ok.removeEventListener('click', onOk);
          cancel.removeEventListener('click', onCancel);
          ov.removeEventListener('click', onBackdrop);
          document.removeEventListener('keydown', onKey);
          resolve(result);
        }
        function onOk()     { done(true); }
        function onCancel() { done(false); }
        function onBackdrop(e) { if (e.target === ov) done(false); }
        function onKey(e) {
          if (e.key === 'Escape') done(false);
          else if (e.key === 'Enter') { e.preventDefault(); done(true); }
        }
        ok.addEventListener('click', onOk);
        cancel.addEventListener('click', onCancel);
        ov.addEventListener('click', onBackdrop);
        document.addEventListener('keydown', onKey);
        ok.focus();
      });
    };

    // Generic single-step confirm. Any <button data-confirm-title="..."
    // data-confirm-body="..." [data-confirm-label="..."]> shows the modal and,
    // on OK, re-fires the click with a flag that bypasses this handler so
    // native form-submit / formaction takes over. Use for revoke / disable /
    // enable / any future single-action confirm.
    document.querySelectorAll('button[data-confirm-title]').forEach(function (btn) {
      btn.addEventListener('click', async function (e) {
        if (btn.dataset.confirmed === '1') return;
        e.preventDefault();
        var ok = await window.confirmModal({
          title: btn.dataset.confirmTitle,
          body: btn.dataset.confirmBody || '',
          confirmLabel: btn.dataset.confirmLabel || 'Continue',
        });
        if (!ok) return;
        btn.dataset.confirmed = '1';
        btn.click();
      });
    });

    // Generic copy-to-clipboard. Any <button data-copy-from="#selector"> grabs
    // the textContent of the matched element and writes it to the clipboard.
    // Briefly swaps the button label to confirm. Falls back to a textarea +
    // execCommand path for browsers that block clipboard API on http://.
    document.querySelectorAll('[data-copy-from]').forEach(function (btn) {
      btn.addEventListener('click', async function () {
        var src = document.querySelector(btn.dataset.copyFrom);
        if (!src) return;
        var text = src.textContent.trim();
        var ok = false;
        try {
          await navigator.clipboard.writeText(text);
          ok = true;
        } catch (e) {
          var ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          try { ok = document.execCommand('copy'); } catch (e2) { ok = false; }
          document.body.removeChild(ta);
        }
        if (!ok) { alert('Could not copy. Select the text manually.'); return; }
        var orig = btn.innerHTML;
        btn.innerHTML = '✓ Copied';
        btn.disabled = true;
        setTimeout(function () { btn.innerHTML = orig; btn.disabled = false; }, 1500);
      });
    });

    // Auto-wires any <form class="bulk-form" data-name="..."> so its bulk-delete
    // button is hidden until at least one row is checked. Click runs a two-stage
    // modal confirm using data-confirm1-* and data-confirm2-* on the form.
    (function () {
      document.querySelectorAll('form.bulk-form').forEach(function (form) {
        var name = form.dataset.name;
        var btn = form.querySelector('[data-bulk-btn]');
        var counter = form.querySelector('[data-bulk-count]');
        var selectAll = form.querySelector('input[type=checkbox][data-select-all]');
        if (!btn || !counter) return;
        function update() {
          var n = form.querySelectorAll('input[name="' + name + '"]:checked').length;
          btn.style.display = n ? '' : 'none';
          counter.textContent = n;
        }
        form.addEventListener('change', function (e) {
          if (e.target && (e.target.name === name || e.target === selectAll)) update();
        });
        if (selectAll) {
          selectAll.addEventListener('click', function () {
            form.querySelectorAll('input[name="' + name + '"]').forEach(function (c) {
              c.checked = selectAll.checked;
            });
            update();
          });
        }
        btn.addEventListener('click', async function (e) {
          if (form.dataset.confirmed === '1') return;  // re-entry after modal -> let submit through
          e.preventDefault();
          var n = form.querySelectorAll('input[name="' + name + '"]:checked').length;
          if (n === 0) return;
          var fmt = function (s) { return (s || '').replace('{n}', n); };
          var ok1 = await window.confirmModal({
            step: 'step 1 of 2',
            title: fmt(form.dataset.confirm1Title),
            body: fmt(form.dataset.confirm1Body),
            confirmLabel: 'Continue',
          });
          if (!ok1) return;
          var ok2 = await window.confirmModal({
            step: 'step 2 of 2 — final confirmation',
            title: fmt(form.dataset.confirm2Title),
            body: fmt(form.dataset.confirm2Body),
            confirmLabel: fmt(form.dataset.confirm2Label) || 'Delete',
          });
          if (!ok2) return;
          form.dataset.confirmed = '1';
          form.submit();
        });
        update();
      });
    })();
  </script>
</body>
</html>
