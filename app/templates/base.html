<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}YgLicenseServer{% endblock %}</title>
  <style>
    :root { --bg:#0d1117; --fg:#c9d1d9; --muted:#8b949e; --accent:#58a6ff; --danger:#f85149; --ok:#3fb950; --bd:#30363d; --card:#161b22; }
    * { box-sizing: border-box; }
    body { background:var(--bg); color:var(--fg); font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; margin:0; }
    a { color:var(--accent); text-decoration:none; }
    a:hover { text-decoration:underline; }
    nav { background:var(--card); border-bottom:1px solid var(--bd); padding:.7em 1.5em; display:flex; gap:1.5em; align-items:center; }
    nav a { color:var(--fg); }
    nav .right { margin-left:auto; }
    main { max-width:1200px; margin:0 auto; padding:1.5em; }
    h1, h2, h3 { line-height:1.2; }
    table { width:100%; border-collapse:collapse; margin:1em 0; }
    th, td { padding:.5em .7em; border-bottom:1px solid var(--bd); text-align:left; vertical-align:top; }
    th { color:var(--muted); font-weight:600; font-size:.85em; text-transform:uppercase; letter-spacing:.05em; }
    code, pre { font-family:Menlo,Consolas,monospace; }
    code { background:var(--card); padding:.1em .35em; border-radius:3px; font-size:.9em; }
    pre { background:var(--card); border:1px solid var(--bd); padding:1em; border-radius:6px; overflow:auto; }
    .card { background:var(--card); border:1px solid var(--bd); border-radius:8px; padding:1.2em; margin:1em 0; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:1em; }
    .stat { text-align:center; }
    .stat .n { font-size:2em; font-weight:600; color:var(--accent); }
    .stat .l { color:var(--muted); font-size:.9em; }
    a.stat { display:block; color:inherit; }
    a.stat:hover { text-decoration:none; border-color:var(--accent); }
    form label { display:block; margin:.8em 0 .25em; color:var(--muted); font-size:.9em; }
    form input, form textarea, form select { width:100%; padding:.5em .7em; border:1px solid var(--bd); background:var(--bg); color:var(--fg); border-radius:4px; font:inherit; }
    button, .btn { background:var(--accent); color:#fff; border:0; padding:.5em 1.1em; border-radius:4px; cursor:pointer; font:inherit; display:inline-block; }
    button:hover, .btn:hover { filter:brightness(1.1); text-decoration:none; }
    .btn.danger { background:var(--danger); }
    .btn.muted { background:#21262d; color:var(--fg); border:1px solid var(--bd); }
    .badge { display:inline-block; padding:.1em .55em; border-radius:10px; font-size:.8em; }
    .badge.active { background:rgba(63,185,80,.15); color:var(--ok); }
    .badge.delinquent { background:rgba(248,81,73,.15); color:var(--danger); }
    .badge.revoked { background:#21262d; color:var(--muted); }
    .badge.disabled { background:rgba(210,153,34,.15); color:#d29922; }
    .error { background:rgba(248,81,73,.1); border:1px solid var(--danger); padding:.7em 1em; border-radius:4px; color:var(--danger); margin:1em 0; }
    .success { background:rgba(63,185,80,.1); border:1px solid var(--ok); padding:.7em 1em; border-radius:4px; color:var(--ok); margin:1em 0; }
    .muted { color:var(--muted); }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.65); display:flex; align-items:center; justify-content:center; z-index:1000; }
    .modal-card { background:var(--card); border:1px solid var(--bd); border-radius:8px; padding:1.5em; max-width:520px; width:calc(100% - 2em); box-shadow:0 12px 40px rgba(0,0,0,.6); }
    .modal-card h3 { margin:0 0 .5em; }
    .modal-card p { margin:.5em 0; color:var(--fg); }
    .modal-card .step { color:var(--muted); font-size:.8em; text-transform:uppercase; letter-spacing:.05em; margin-bottom:.3em; }
    .modal-actions { display:flex; gap:.6em; justify-content:flex-end; margin-top:1.2em; }
    /* iOS-style toggle: square switch with sliding knob. Use as a <button> so
       it submits a form (formaction picks /enable or /disable based on state). */
    .toggle-switch { position:relative; width:38px; height:22px; padding:0; border:0; border-radius:11px; background:#3a3f47; cursor:pointer; vertical-align:middle; transition:background .15s; }
    .toggle-switch.on { background:var(--ok); }
    .toggle-switch::before { content:''; position:absolute; top:2px; left:2px; width:18px; height:18px; background:#fff; border-radius:50%; transition:transform .15s; }
    .toggle-switch.on::before { transform:translateX(16px); }
    .toggle-switch:hover { filter:brightness(1.1); }
    .toggle-label { color:var(--muted); font-size:.85em; margin-right:.4em; vertical-align:middle; }
    /* Icon-only button: square, transparent, hover-glow. Use for trash and
       similar single-action row controls. */
    .btn-icon { background:transparent; border:1px solid transparent; padding:.3em; border-radius:4px; color:var(--muted); cursor:pointer; line-height:0; }
    .btn-icon:hover { color:var(--danger); border-color:var(--bd); background:var(--card); }
    .btn-icon svg { display:block; }
    /* Click-to-sort table headers. Opt in with <table data-sortable> and mark
       sortable columns with <th data-sort-key="..."> (optional data-sort-type
       = "text" | "number" | "date"). Active column shows an arrow. */
    th[data-sort-key] { cursor:pointer; user-select:none; }
    th[data-sort-key]:hover { color:var(--fg); }
    th[data-sort-key]::after { content:""; display:inline-block; width:0; }
    th[aria-sort="ascending"]::after  { content:" \25B2"; color:var(--accent); font-size:.8em; }
    th[aria-sort="descending"]::after { content:" \25BC"; color:var(--accent); font-size:.8em; }
    /* Busy/loading state — set on a submit button while its form's POST is in
       flight (server round-trip + redirect can take a few seconds for actions
       that fan out a webhook). Prevents double-click while the request runs. */
    .btn-spinner { display:inline-block; width:14px; height:14px; border:2px solid currentColor; border-top-color:transparent; border-radius:50%; animation:btn-spin .7s linear infinite; vertical-align:middle; }
    .btn-spinner.sm { width:12px; height:12px; border-width:2px; }
    @keyframes btn-spin { to { transform:rotate(360deg); } }
    button[aria-busy="true"], .btn[aria-busy="true"] { cursor:wait; }
    .toggle-switch.loading { display:inline-flex; align-items:center; justify-content:center; }
    .toggle-switch.loading::before { display:none; }
    .toggle-switch.loading .btn-spinner { color:#fff; width:12px; height:12px; border-width:2px; }
  </style>
</head>
<body>
  {% if request.cookies.get('asm_ls_session') %}
  <nav>
    <strong><a href="/admin">YgLicenseServer</a></strong>
    {% if app_version %}<span class="muted" style="font-size:.85em;font-family:Menlo,Consolas,monospace;">v{{ app_version }}</span>{% endif %}
    <a href="/admin">Dashboard</a>
    <a href="/admin/products">Products</a>
    <a href="/admin/customers">Customers</a>
    <a href="/admin/events">Events</a>
    <a href="/admin/webhook-deliveries">Webhook Deliveries</a>
    <form class="right" action="/admin/logout" method="post" style="margin:0;">
      {{ csrf_input(request) }}
      <button class="btn muted" type="submit">Log Out</button>
    </form>
  </nav>
  {% endif %}
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Reusable confirm modal. Hidden until window.confirmModal(...) shows it. -->
  <div id="confirm-modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
    <div class="modal-card">
      <div class="step" id="confirm-step"></div>
      <h3 id="confirm-title"></h3>
      <p id="confirm-body"></p>
      <div class="modal-actions">
        <button type="button" class="btn muted" id="confirm-cancel">Cancel</button>
        <button type="button" class="btn danger" id="confirm-ok">Continue</button>
      </div>
    </div>
  </div>

  <script src="/static/admin.js?v={{ app_version }}"></script>
</body>
</html>
