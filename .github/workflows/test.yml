name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -q

  docker:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: yg-license-server:ci

      - name: Smoke-test alembic upgrade head on fresh image
        run: |
          docker run --rm \
            -e ADMIN_TOKEN=t -e SESSION_SECRET=s \
            -e DATABASE_URL=sqlite:////tmp/license.db \
            --entrypoint alembic \
            yg-license-server:ci upgrade head
